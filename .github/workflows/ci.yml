name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: jobmatch
          POSTGRES_PASSWORD: jobmatch
          POSTGRES_DB: jobmatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://jobmatch:jobmatch@localhost:5432/jobmatch_test
      JWT_SECRET: test-secret-ci
      CLAUDE_API_KEY: dummy-key-for-tests
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Lint (ruff, informational)
        continue-on-error: true
        run: |
          cd backend
          ruff check app

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --tb=short -m "not battery"

      - name: AI evaluation harness (offline, deterministic)
        run: |
          cd backend
          python -m app.evaluation.run

  frontend-build:
    name: Frontend lint + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npx eslint src --max-warnings 9999

      - name: Test
        env:
          CI: "true"
        run: |
          cd frontend
          npm run test:ci

      - name: Build
        env:
          CI: "false"
        run: |
          cd frontend
          npm run build
